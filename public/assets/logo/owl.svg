<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 666.66669 666.66669">
  <style>
    .owl-stroke {
      fill: none;
      stroke: #b79250;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1 1;
      stroke-dashoffset: 1;
      animation: owlDraw 1.9s ease-out 0.15s forwards, owlBreath 3.2s ease-in-out 2.4s infinite;
    }
    .owl-stroke:nth-of-type(2n)  { animation-delay: 0.22s, 2.4s; }
    .owl-stroke:nth-of-type(3n)  { animation-delay: 0.32s, 2.4s; }
    .owl-stroke:nth-of-type(5n)  { animation-delay: 0.42s, 2.4s; }
    .owl-stroke:nth-of-type(7n)  { animation-delay: 0.52s, 2.4s; }
    .owl-stroke:nth-of-type(11n) { animation-delay: 0.62s, 2.4s; }
    .owl-fill {
      fill: #b79250;
      stroke: none;
      opacity: 0;
      transform-origin: center;
      transform-box: fill-box;
      animation: owlFillIn 0.45s cubic-bezier(0.34,1.56,0.64,1) 2.1s forwards;
    }
    @keyframes owlDraw { to { stroke-dashoffset: 0; } }
    @keyframes owlBreath {
      0%, 100% { stroke-width: 3; opacity: 1; }
      50%      { stroke-width: 3.5; opacity: 0.94; }
    }
    @keyframes owlFillIn {
      0%   { opacity: 0; transform: scale(0.2); }
      60%  { opacity: 1; transform: scale(1.15); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
